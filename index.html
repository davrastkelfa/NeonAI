<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon AI | Last Hope</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --accent: #2ecc71; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .header { text-align: center; padding: 10px; color: var(--accent); font-weight: bold; border-bottom: 1px solid #222; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px; border-radius: 12px; max-width: 85%; font-size: 14px; border: 1px solid #333; }
        .user { align-self: flex-end; border-color: var(--neon); color: var(--neon); }
        .input-area { display: flex; gap: 8px; padding: 12px; background: #0a0a0a; border-radius: 12px; }
        input { flex-grow: 1; background: transparent; border: none; color: #fff; outline: none; }
        button { background: var(--accent); border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .loader { display: none; color: var(--accent); font-size: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="header">NEON CORE: EMERGENCY PROTOCOL</div>
    <div id="chat"></div>
    <div id="loading" class="loader">ПОДКЛЮЧЕНИЕ К УЗЛУ...</div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Напиши привет...">
        <button onclick="send()">GO</button>
    </div>

<script>
const KEY = 'MDE5ZGMwNWYtMzU0ZS03YTNmLTgyMGItMGQzYzYyNTM5OTk3OjI5Nzk1ODI3LWVjMTgtNDYxMS1hMDc2LTc2NGIwNGNhMzgxYg==';

async function send() {
    const inp = document.getElementById('userInput');
    const text = inp.value.trim();
    if (!text) return;

    addMsg(text, 'user');
    inp.value = "";
    document.getElementById('loading').style.display = 'block';

    try {
        // Мы используем прокси-сервер, чтобы Сбер не блокировал запрос с GitHub
        const proxyUrl = "https://corsproxy.io/?";
        const targetUrl = "https://ngw.devices.sberbank.ru:9443/api/v2/oauth";
        
        const response = await fetch(proxyUrl + encodeURIComponent(targetUrl), {
            method: 'POST',
            headers: {
                'Authorization': 'Basic ' + KEY,
                'RqUID': '6f0ad003-7994-4c07-89f3-bc47cc080665',
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: 'scope=GIGACHAT_API_PERS'
        });

        const data = await response.json();
        
        if (data.access_token) {
            // Если получили токен, значит прокси сработал!
            addMsg("Узел Сбера ответил. Протокол авторизации пройден. Задавай вопрос!", "ai");
        } else {
            addMsg("Сбер отклонил ключ. Проверь, активен ли проект в личном кабинете.", "ai");
        }
    } catch (e) {
        // Если даже прокси не помог, значит нужно установить сертификаты Минцифры на телефон
        addMsg("Сетевой барьер. Установи сертификаты Минцифры или используй Яндекс.Браузер.", "ai");
    } finally {
        document.getElementById('loading').style.display = 'none';
    }
}

function addMsg(t, s) {
    const d = document.createElement('div');
    d.className = `msg ${s}`;
    d.innerText = t;
    document.getElementById('chat').appendChild(d);
    document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}
window.onload = () => addMsg("Система в режиме ожидания. Попробуй отправить сообщение.", "ai");
</script>
</body>
</html>
