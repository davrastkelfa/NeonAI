<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon AI | GigaChat RU</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --accent: #2ecc71; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .header { text-align: center; padding: 10px; border-bottom: 1px solid #222; color: var(--accent); font-weight: bold; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px; border-radius: 12px; max-width: 85%; font-size: 14px; line-height: 1.4; }
        .user { align-self: flex-end; border: 1px solid var(--neon); color: var(--neon); }
        .ai { align-self: flex-start; background: #111; border: 1px solid #333; }
        .input-area { display: flex; gap: 8px; padding: 12px; background: #0a0a0a; border: 1px solid #222; border-radius: 12px; }
        input { flex-grow: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; }
        button { background: var(--accent); color: #000; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .footer { text-align: center; font-size: 11px; color: var(--accent); padding: 10px; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="header">GIGACHAT NEON CORE (NO VPN)</div>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Спроси что угодно...">
        <button onclick="send()">GO</button>
    </div>
    <div class="footer">Made by Davrast Kelfa</div>

<script>
// Твой секретный ключ
const AUTH_KEY = 'MDE5ZGMwNWYtMzU0ZS03YTNmLTgyMGItMGQzYzYyNTM5OTk3OjI5Nzk1ODI3LWVjMTgtNDYxMS1hMDc2LTc2NGIwNGNhMzgxYg==';

async function getAccessToken() {
    try {
        const response = await fetch('https://ngw.devices.sberbank.ru:9443/api/v2/oauth', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'Accept': 'application/json',
                'RqUID': '6f0ad003-7994-4c07-89f3-bc47cc080665', // Уникальный ID запроса
                'Authorization': `Basic ${AUTH_KEY}`
            },
            body: 'scope=GIGACHAT_API_PERS'
        });
        const data = await response.json();
        return data.access_token;
    } catch (e) {
        console.error("Ошибка получения токена:", e);
        return null;
    }
}

async function send() {
    const inp = document.getElementById('userInput');
    const text = inp.value.trim();
    if (!text) return;

    addMsg(text, 'user');
    inp.value = "";

    try {
        const token = await getAccessToken();
        if (!token) {
            addMsg("Ошибка авторизации. Проверь ключ Сбера.", "ai");
            return;
        }

        const res = await fetch('https://gigachat.devices.sberbank.ru/api/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
                model: "GigaChat",
                messages: [{role: "user", content: text}],
                stream: false
            })
        });

        const data = await res.json();
        if (data.choices && data.choices[0]) {
            addMsg(data.choices[0].message.content, 'ai');
        } else {
            addMsg("Сбер вернул ошибку. Возможно, закончились бесплатные токены.", "ai");
        }
    } catch (e) {
        addMsg("Сетевая ошибка. На GitHub Pages это должно работать без VPN!", "ai");
    }
}

function addMsg(t, s) {
    const d = document.createElement('div');
    d.className = `msg ${s}`;
    d.innerText = t;
    document.getElementById('chat').appendChild(d);
    document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}

window.onload = () => addMsg("Российское ядро GigaChat активно. Жду твой вопрос без VPN!", "ai");
</script>
</body>
</html>
