<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Mistral AI | Davrast Kelfa</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --accent: #00d4ff; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; overflow: hidden; }
        
        /* Шапка с переключателем языков */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222; }
        .lang-switch { display: flex; gap: 5px; }
        .lang-btn { background: #111; border: 1px solid #333; color: #777; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: 0.3s; }
        .lang-btn.active { border-color: var(--neon); color: var(--neon); box-shadow: 0 0 5px var(--neon); }

        /* Окно чата */
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; margin: 10px 0; border: 1px solid #111; border-radius: 10px; scroll-behavior: smooth; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 85%; font-size: 14px; line-height: 1.5; word-wrap: break-word; position: relative; }
        .user { align-self: flex-end; background: rgba(0, 255, 65, 0.05); border: 1px solid var(--neon); color: var(--neon); }
        .ai { align-self: flex-start; background: #111; border: 1px solid #333; color: #e0e0e0; }

        /* Поле ввода */
        .input-area { display: flex; gap: 8px; padding: 12px; background: #0a0a0a; border-radius: 12px; border: 1px solid #222; }
        input { flex-grow: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; }
        button#send-btn { background: var(--accent); color: #000; border: none; padding: 0 20px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button#send-btn:hover { opacity: 0.8; }

        /* Футер */
        .footer { text-align: center; font-size: 11px; color: var(--neon); padding: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; }
        .loader { display: none; text-align: center; color: var(--accent); font-size: 10px; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div style="color: var(--accent); font-weight: bold; font-size: 14px;">MISTRAL NEON CORE</div>
        <div class="lang-switch">
            <button class="lang-btn active" onclick="changeLang('ru')">RU</button>
            <button class="lang-btn" onclick="changeLang('en')">EN</button>
            <button class="lang-btn" onclick="changeLang('es')">ES</button>
            <button class="lang-btn" onclick="changeLang('fr')">FR</button>
        </div>
    </div>

    <div id="chat-window"></div>
    <div id="loading-status" class="loader">MISTRAL_THINKING...</div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Введите сообщение...">
        <button id="send-btn" onclick="sendMessage()">GO</button>
    </div>

    <div class="footer">Made by Davrast Kelfa</div>

<script>
    // Публичный ключ для Mistral (Hugging Face)
    const API_TOKEN = "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"; 
    let currentLang = 'ru';

    const uiTexts = {
        ru: { welcome: "Ядро Mistral активно. Готов к работе.", placeholder: "Введите сообщение...", loading: "ОБРАБОТКА..." },
        en: { welcome: "Mistral core active. Ready for input.", placeholder: "Type a message...", loading: "PROCESSING..." },
        es: { welcome: "Núcleo Mistral activo. Listo para trabajar.", placeholder: "Escribe un mensaje...", loading: "PROCESANDO..." },
        fr: { welcome: "Cœur Mistral actif. Prêt à l'emploi.", placeholder: "Tapez un message...", loading: "TRAITEMENT..." }
    };

    function changeLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.toLowerCase() === lang);
        });
        document.getElementById('userInput').placeholder = uiTexts[lang].placeholder;
        document.getElementById('loading-status').innerText = uiTexts[lang].loading;
    }

    function addMessage(text, side) {
        const chatWindow = document.getElementById('chat-window');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${side}`;
        msgDiv.innerText = text;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function sendMessage() {
        const inputField = document.getElementById('userInput');
        const text = inputField.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        inputField.value = "";
        document.getElementById('loading-status').style.display = 'block';

        try {
            const response = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.3", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    inputs: `<s>[INST] Answer in ${currentLang} language: ${text} [/INST]`,
                    parameters: { max_new_tokens: 500, temperature: 0.7 }
                })
            });

            const result = await response.json();
            
            if (response.ok) {
                // Mistral возвращает полный текст, поэтому убираем из него промпт пользователя
                let fullText = result[0].generated_text;
                let cleanResponse = fullText.split('[/INST]').pop().trim();
                addMessage(cleanResponse, 'ai');
            } else {
                addMessage("Ошибка системы: " + (result.error || "Неизвестный сбой"), "ai");
            }
        } catch (error) {
            addMessage("Критический сбой связи. Проверьте интернет или попробуйте VPN.", "ai");
        } finally {
            document.getElementById('loading-status').style.display = 'none';
        }
    }

    // Обработка нажатия Enter
    document.getElementById('userInput').addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    // Приветствие при загрузке
    window.onload = () => {
        addMessage(uiTexts[currentLang].welcome, 'ai');
    };
</script>
</body>
</html>
